# Proxmox API token. This plaintext Secret is only an EXAMPLE of the shape the
# Deployment expects. Don't commit a real token: encrypt it (SOPS, Sealed Secrets) or
# sync it from a secret manager (1Password, External Secrets) instead.
apiVersion: v1
kind: Secret
metadata:
  name: energy-watchdog
  namespace: energy
type: Opaque
stringData:
  PROXMOX_TOKEN_ID: "energy-watchdog@pve!watchdog"
  PROXMOX_TOKEN_SECRET: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
